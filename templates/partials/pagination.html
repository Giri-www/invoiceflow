{% if is_paginated %}
  <div class="pagination">
    {% if page_obj.has_previous %}
      <a class="btn btn-ghost" href="?{% if request.GET %}{{ request.GET.urlencode }}&{% endif %}page={{ page_obj.previous_page_number }}">Previous</a>
    {% else %}
      <span class="btn btn-ghost is-disabled">Previous</span>
    {% endif %}

    <span class="pagination-meta">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>

    {% if page_obj.has_next %}
      <a class="btn btn-ghost" href="?{% if request.GET %}{{ request.GET.urlencode }}&{% endif %}page={{ page_obj.next_page_number }}">Next</a>
    {% else %}
      <span class="btn btn-ghost is-disabled">Next</span>
    {% endif %}
  </div>
{% endif %}
